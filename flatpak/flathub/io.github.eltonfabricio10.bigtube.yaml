# Flathub manifest for BigTube — Universal Multimedia Downloader.
#
# This is the offline, reproducible variant submitted to Flathub: Rust crates
# are vendored via cargo-sources.json (generated by flatpak-cargo-generator from
# rust/Cargo.lock), so the build needs no network access for cargo.
#
# Regenerate the vendored sources after changing dependencies:
#   pip install aiohttp toml tomlkit
#   python flatpak-cargo-generator.py rust/Cargo.lock -o flatpak/flathub/cargo-sources.json
#
# Then bump the bigtube module's `tag`/`commit` below to the matching release.
id: io.github.eltonfabricio10.bigtube
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: bigtube-gui

finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=dri
  - --filesystem=xdg-download
  - --filesystem=xdg-videos
  - --filesystem=xdg-music

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/man
  - '*.a'
  - '*.la'

modules:
  # MP3 encoder, needed by yt-dlp/ffmpeg for audio extraction to MP3.
  - name: lame
    sources:
      - type: archive
        url: https://downloads.sourceforge.net/project/lame/lame/3.100/lame-3.100.tar.gz
        sha256: ddfe36cab873794038ae2c1210557ad34857a4b6bdc515785d1da9e175b1da1e
    config-opts:
      - --disable-static
      - --enable-nasm
      - --disable-frontend

  # ffmpeg CLI — yt-dlp uses it to merge streams and extract/convert audio.
  # (The GNOME runtime ships ffmpeg libraries but not the command-line tool.)
  - name: ffmpeg
    sources:
      - type: archive
        url: https://ffmpeg.org/releases/ffmpeg-7.1.tar.xz
        sha256: 40973d44970dbc83ef302b0609f2e74982be2d85916dd2ee7472d30678a7abe6
    config-opts:
      - --disable-static
      - --enable-shared
      - --disable-doc
      - --disable-debug
      - --enable-gpl
      - --enable-libmp3lame
      - --enable-encoder=aac
      - --enable-encoder=opus

  - name: bigtube
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/bigtube/cargo
    build-commands:
      - cargo --offline build --release --manifest-path rust/Cargo.toml -p bigtube-gui -p bigtube-cli
      - install -Dm755 rust/target/release/bigtube-gui /app/bin/bigtube-gui
      - install -Dm755 rust/target/release/bigtube /app/bin/bigtube
      - install -Dm644 src/bigtube/data/io.github.eltonfabricio10.bigtube.desktop /app/share/applications/io.github.eltonfabricio10.bigtube.desktop
      - install -Dm644 src/bigtube/data/io.github.eltonfabricio10.bigtube.metainfo.xml /app/share/metainfo/io.github.eltonfabricio10.bigtube.metainfo.xml
      - install -Dm644 src/bigtube/data/bigtube.svg /app/share/icons/hicolor/scalable/apps/bigtube.svg
      - install -Dm644 src/bigtube/data/bigtube.png /app/share/icons/hicolor/256x256/apps/bigtube.png
      - |
        for po in po/*.po; do
          [ -e "$po" ] || continue
          lang=$(basename "$po" .po)
          install -d "/app/share/locale/$lang/LC_MESSAGES"
          msgfmt "$po" -o "/app/share/locale/$lang/LC_MESSAGES/bigtube.mo"
        done
    sources:
      - type: git
        url: https://github.com/eltonfabricio10/bigtube.git
        tag: v2.1.77
        commit: debe3b5d2cd40426c2d5d3db2252a879369586a8
      - cargo-sources.json
