# Install: pip install pre-commit && pre-commit install
repos:
  - repo: local
    hooks:
      - id: sync-version-from-git
        name: Sync version from git (pyproject + PKGBUILD)
        entry: python scripts/sync_version_from_git.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
