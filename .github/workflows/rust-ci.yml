name: Rust CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

defaults:
  run:
    working-directory: rust

jobs:
  build-test:
    # Skip the version-bump commit the release workflow pushes, so it doesn't
    # re-trigger CI (and another release).
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install GTK4 / libadwaita / GStreamer dev libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev libadwaita-1-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good gettext

      - name: Rust toolchain
        run: rustup component add rustfmt clippy

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests (core)
        run: cargo test -p bigtube-core

      - name: Release build
        run: cargo build --release
