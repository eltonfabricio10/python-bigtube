name: Build and Release

# Publica release no GitHub + pacote Arch + AUR automaticamente quando o "Rust CI"
# da main passa. Empacota o app RUST (substitui o antigo release do app Python).
# Também pode ser executado manualmente em Actions -> Build and Release -> Run workflow.
on:
  workflow_run:
    workflows: ["Rust CI"]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:
    inputs:
      version:
        description: "Versao sem o v. Deixe vazio para calcular pela ultima tag."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Prepare release
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      pkgver: ${{ steps.prepare.outputs.pkgver }}
      tag: ${{ steps.prepare.outputs.tag }}
      should_release: ${{ steps.prepare.outputs.should_release }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync version, commit, and tag
        id: prepare
        env:
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
          RELEASE_BRANCH: ${{ github.event.workflow_run.head_branch || github.ref_name }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            VERSION=$(python scripts/sync_rust_version.py --version "$INPUT_VERSION")
          else
            VERSION=$(python scripts/sync_rust_version.py)
          fi

          TAG="v${VERSION}"
          echo "pkgver=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists. Nothing to release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Keep Cargo.lock's workspace member versions in sync with Cargo.toml.
          cargo update --manifest-path rust/Cargo.toml --workspace --quiet || true

          if ! git diff --quiet rust/Cargo.toml rust/Cargo.lock rust/packaging/PKGBUILD; then
            git add rust/Cargo.toml rust/Cargo.lock rust/packaging/PKGBUILD
            git commit -m "chore: release ${TAG} [skip ci]"
            git push origin "HEAD:${RELEASE_BRANCH}"
          fi

          git tag "${TAG}"
          git push origin "${TAG}"
          echo "should_release=true" >> "$GITHUB_OUTPUT"

  build-and-release:
    name: Build binary and publish release
    needs: prepare-release
    if: ${{ needs.prepare-release.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    container:
      # Build on Arch so the binary links against the same library/glibc
      # versions Arch/Manjaro users have.
      image: archlinux:base-devel
    outputs:
      pkgver: ${{ needs.prepare-release.outputs.pkgver }}
      tag: ${{ needs.prepare-release.outputs.tag }}
    steps:
      - name: Install build tooling
        run: |
          pacman -Syu --noconfirm git github-cli rust gettext \
            gtk4 libadwaita gstreamer gst-plugins-base

      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Compile binaries and assemble the prebuilt tarball
        env:
          PKGVER: ${{ needs.prepare-release.outputs.pkgver }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          # Plain cargo build (no makepkg LTO) so the `ring` crate links.
          (cd rust && cargo build --release --locked)

          stage="$GITHUB_WORKSPACE/stage"
          bash rust/packaging/stage-tree.sh "$stage"

          tar -C "$stage" -czf "bigtube-${PKGVER}-x86_64.tar.gz" usr
          sha256sum "bigtube-${PKGVER}-x86_64.tar.gz"

      - name: Publish GitHub Release with the prebuilt tarball
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
          GH_REPO: ${{ github.repository }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          if gh release view "$TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" "$GITHUB_WORKSPACE"/bigtube-*-x86_64.tar.gz \
              --clobber --repo "$GH_REPO"
          else
            gh release create "$TAG" "$GITHUB_WORKSPACE"/bigtube-*-x86_64.tar.gz \
              --title "$TAG" --generate-notes --repo "$GH_REPO"
          fi

  build-deb:
    name: Build .deb (Debian/Ubuntu)
    needs: [prepare-release, build-and-release]
    if: ${{ needs.prepare-release.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    container:
      # Build on Ubuntu 24.04 LTS (GTK 4.14, libadwaita 1.5, glibc 2.39) so the
      # .deb links against the same library/glibc versions found on Ubuntu 24.04+
      # and Debian 13. The code needs GTK >= 4.12 / libadwaita >= 1.5, so older
      # bases (Debian 12, Ubuntu 22.04) can't build or run it anyway.
      image: ubuntu:24.04
    env:
      DEBIAN_FRONTEND: noninteractive
      PKGVER: ${{ needs.prepare-release.outputs.pkgver }}
    steps:
      - name: Install build tooling
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl git build-essential pkg-config gettext \
            libgtk-4-dev libadwaita-1-dev libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev ruby ruby-dev
          gem install --no-document fpm
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Compile and build the .deb
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          (cd rust && cargo build --release --locked)

          stage="$GITHUB_WORKSPACE/stage"
          bash rust/packaging/stage-tree.sh "$stage"

          fpm -s dir -t deb \
            -n bigtube -v "$PKGVER" --iteration 1 -a amd64 \
            --description "Universal Multimedia Downloader (GTK4/libadwaita + GStreamer)" \
            --url "https://github.com/eltonfabricio10/bigtube" \
            --license MIT --category net \
            --maintainer "eltonff <eltonfabricio10@gmail.com>" \
            --vendor "eltonff" \
            --provides bigtube --conflicts bigtube --replaces bigtube \
            --depends libgtk-4-1 --depends libadwaita-1-0 \
            --depends libgstreamer1.0-0 --depends gstreamer1.0-plugins-base \
            --depends gstreamer1.0-plugins-good --depends gstreamer1.0-gtk4 \
            --depends yt-dlp \
            --deb-recommends gstreamer1.0-plugins-bad \
            --deb-recommends gstreamer1.0-libav --deb-recommends ffmpeg \
            -C "$stage" usr
          ls -l bigtube_*.deb

      - name: Attach the .deb to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          files: bigtube_*.deb
          fail_on_unmatched_files: true

  build-rpm:
    name: Build .rpm (Fedora)
    needs: [prepare-release, build-and-release]
    if: ${{ needs.prepare-release.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    container:
      # Build on Fedora 40 (GTK 4.14, libadwaita 1.5) so the .rpm links against
      # the right library/glibc versions for Fedora 40+.
      image: fedora:40
    env:
      PKGVER: ${{ needs.prepare-release.outputs.pkgver }}
    steps:
      - name: Install build tooling
        run: |
          dnf -y install \
            ca-certificates curl git gcc pkgconf-pkg-config gettext make \
            gtk4-devel libadwaita-devel gstreamer1-devel \
            gstreamer1-plugins-base-devel ruby ruby-devel rpm-build \
            redhat-rpm-config
          gem install --no-document fpm
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Compile and build the .rpm
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          (cd rust && cargo build --release --locked)

          stage="$GITHUB_WORKSPACE/stage"
          bash rust/packaging/stage-tree.sh "$stage"

          # ffmpeg and the gtk4 sink live in RPM Fusion (not Fedora's default
          # repos), so they're documented rather than hard-required to keep the
          # package installable everywhere.
          fpm -s dir -t rpm \
            -n bigtube -v "$PKGVER" --iteration 1 -a x86_64 \
            --description "Universal Multimedia Downloader (GTK4/libadwaita + GStreamer)" \
            --url "https://github.com/eltonfabricio10/bigtube" \
            --license MIT --category Applications/Internet \
            --maintainer "eltonff <eltonfabricio10@gmail.com>" \
            --vendor "eltonff" \
            --provides bigtube --conflicts bigtube \
            --depends gtk4 --depends libadwaita --depends gstreamer1 \
            --depends gstreamer1-plugins-base --depends gstreamer1-plugins-good \
            --depends gstreamer1-plugin-gtk4 --depends yt-dlp \
            -C "$stage" usr
          ls -l bigtube-*.rpm

      - name: Attach the .rpm to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          files: bigtube-*.rpm
          fail_on_unmatched_files: true

  build-appimage:
    name: Build AppImage (portable)
    needs: [prepare-release, build-and-release]
    if: ${{ needs.prepare-release.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    container:
      # Build on Ubuntu 24.04 (GTK 4.14, libadwaita 1.5, glibc 2.39). The AppImage
      # bundles GTK4/libadwaita + the GStreamer plugins (incl. the gtk4 sink), so
      # it runs on any x86_64 system with glibc >= 2.39 regardless of the distro's
      # GTK version — broader than the .deb/.rpm, which need the distro's GTK.
      image: ubuntu:24.04
    env:
      DEBIAN_FRONTEND: noninteractive
      PKGVER: ${{ needs.prepare-release.outputs.pkgver }}
    steps:
      - name: Install build + bundle tooling
        run: |
          apt-get update
          # NOTE: Ubuntu 24.04 has no prebuilt gstreamer1.0-gtk4 (only the Rust
          # source); we build that sink from source below. The -dev packages for
          # gtk4/gstreamer-base are what the sink needs to compile.
          apt-get install -y --no-install-recommends \
            ca-certificates curl git build-essential pkg-config gettext \
            file patchelf desktop-file-utils librsvg2-common \
            libgtk-4-dev libadwaita-1-dev libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libwayland-dev libegl-dev libx11-dev \
            libgtk-4-1 libadwaita-1-0 \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad gstreamer1.0-libav
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Build the GStreamer gtk4 paintable sink from source
        run: |
          # The player needs libgstgtk4.so. Ubuntu 24.04 ships gstreamer 1.24 but
          # not the prebuilt plugin, so build it with cargo-c from the matching
          # gst-plugins-rs 0.12 branch and drop it into the system plugin dir so
          # linuxdeploy bundles it like any other plugin.
          cargo install cargo-c --locked
          git clone --depth 1 --branch 0.12 \
            https://gitlab.freedesktop.org/gstreamer/gst-plugins-rs.git /tmp/gst-plugins-rs
          # Match the feature set of the distro-prebuilt plugin so playback is
          # GL/dmabuf-accelerated rather than CPU-uploaded.
          (cd /tmp/gst-plugins-rs && cargo cbuild -p gst-plugin-gtk4 --release --locked \
            --features wayland,x11egl,x11glx,dmabuf)
          so=$(find /tmp/gst-plugins-rs/target -name libgstgtk4.so | head -1)
          test -n "$so"
          install -Dm755 "$so" /usr/lib/x86_64-linux-gnu/gstreamer-1.0/libgstgtk4.so
          echo "installed gtk4 sink: $so"

      - name: Compile, stage, and build the AppImage
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          (cd rust && cargo build --release --locked)

          stage="$GITHUB_WORKSPACE/stage"
          bash rust/packaging/stage-tree.sh "$stage"
          bash rust/packaging/build-appimage.sh "$stage" "$PKGVER"
          ls -lh BigTube-*.AppImage

      - name: Attach the AppImage to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          files: BigTube-*.AppImage
          fail_on_unmatched_files: true

  deploy-aur:
    name: Deploy to Arch User Repository
    needs: build-and-release
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - name: Install AUR deploy dependencies
        run: pacman -Syu --noconfirm git openssh pacman-contrib sudo

      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.build-and-release.outputs.tag }}

      - name: Publish to AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          TAG: ${{ needs.build-and-release.outputs.tag }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          useradd -m builduser
          chown -R builduser:builduser "$GITHUB_WORKSPACE"

          install -d -m 700 ~/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          test -s ~/.ssh/known_hosts

          ssh -i "$HOME/.ssh/aur" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            aur@aur.archlinux.org help >/dev/null

          # Refresh checksums and generate .SRCINFO from the Rust PKGBUILD.
          su - builduser -c "cd '$GITHUB_WORKSPACE/rust/packaging' && updpkgsums"
          su - builduser -c "cd '$GITHUB_WORKSPACE/rust/packaging' && makepkg --printsrcinfo" \
            > "$GITHUB_WORKSPACE/rust/packaging/.SRCINFO"

          GIT_SSH_COMMAND="ssh -i $HOME/.ssh/aur -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts" \
            git clone ssh://aur@aur.archlinux.org/bigtube-bin.git aur-package
          cp "$GITHUB_WORKSPACE/rust/packaging/PKGBUILD" \
             "$GITHUB_WORKSPACE/rust/packaging/.SRCINFO" aur-package/
          cd aur-package

          git config --global --add safe.directory "$PWD"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add PKGBUILD .SRCINFO
          # `--cached` so a brand-new (empty) AUR repo, where the files are still
          # untracked, is correctly detected as "has changes" on the first push.
          if git diff --cached --quiet; then
            echo "AUR package already up to date."
            exit 0
          fi

          git commit -m "Lancamento da versao ${TAG} (Rust)"
          GIT_SSH_COMMAND="ssh -i $HOME/.ssh/aur -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts" git push
