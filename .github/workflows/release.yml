name: Build and Release

# Publica release no GitHub + pacote Arch + AUR automaticamente quando o "Rust CI"
# da main passa. Empacota o app RUST (substitui o antigo release do app Python).
# Também pode ser executado manualmente em Actions -> Build and Release -> Run workflow.
on:
  workflow_run:
    workflows: ["Rust CI"]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:
    inputs:
      version:
        description: "Versao sem o v. Deixe vazio para calcular pela ultima tag."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Prepare release
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      pkgver: ${{ steps.prepare.outputs.pkgver }}
      tag: ${{ steps.prepare.outputs.tag }}
      should_release: ${{ steps.prepare.outputs.should_release }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync version, commit, and tag
        id: prepare
        env:
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
          RELEASE_BRANCH: ${{ github.event.workflow_run.head_branch || github.ref_name }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            VERSION=$(python scripts/sync_rust_version.py --version "$INPUT_VERSION")
          else
            VERSION=$(python scripts/sync_rust_version.py)
          fi

          TAG="v${VERSION}"
          echo "pkgver=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists. Nothing to release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Keep Cargo.lock's workspace member versions in sync with Cargo.toml.
          cargo update --manifest-path rust/Cargo.toml --workspace --quiet || true

          if ! git diff --quiet rust/Cargo.toml rust/Cargo.lock rust/packaging/PKGBUILD; then
            git add rust/Cargo.toml rust/Cargo.lock rust/packaging/PKGBUILD
            git commit -m "chore: release ${TAG} [skip ci]"
            git push origin "HEAD:${RELEASE_BRANCH}"
          fi

          git tag "${TAG}"
          git push origin "${TAG}"
          echo "should_release=true" >> "$GITHUB_OUTPUT"

  build-and-release:
    name: Build Arch package and publish release
    needs: prepare-release
    if: ${{ needs.prepare-release.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    outputs:
      pkgver: ${{ needs.prepare-release.outputs.pkgver }}
      tag: ${{ needs.prepare-release.outputs.tag }}
    steps:
      - name: Install build tooling
        run: pacman -Syu --noconfirm git github-cli pacman-contrib sudo

      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Build Rust package (makepkg)
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          useradd -m builduser
          echo "builduser ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builduser
          chown -R builduser:builduser "$GITHUB_WORKSPACE"
          su - builduser -c "cd '$GITHUB_WORKSPACE/rust/packaging' && updpkgsums && makepkg -s --noconfirm"

      - name: Publish GitHub Release with the Arch package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
          GH_REPO: ${{ github.repository }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          if gh release view "$TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" "$GITHUB_WORKSPACE"/rust/packaging/*.pkg.tar.zst \
              --clobber --repo "$GH_REPO"
          else
            gh release create "$TAG" "$GITHUB_WORKSPACE"/rust/packaging/*.pkg.tar.zst \
              --title "$TAG" --generate-notes --repo "$GH_REPO"
          fi

  deploy-aur:
    name: Deploy to Arch User Repository
    needs: build-and-release
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - name: Install AUR deploy dependencies
        run: pacman -Syu --noconfirm git openssh pacman-contrib sudo

      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.build-and-release.outputs.tag }}

      - name: Publish to AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          TAG: ${{ needs.build-and-release.outputs.tag }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          useradd -m builduser
          chown -R builduser:builduser "$GITHUB_WORKSPACE"

          install -d -m 700 ~/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          test -s ~/.ssh/known_hosts

          ssh -i "$HOME/.ssh/aur" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            aur@aur.archlinux.org help >/dev/null

          # Refresh checksums and generate .SRCINFO from the Rust PKGBUILD.
          su - builduser -c "cd '$GITHUB_WORKSPACE/rust/packaging' && updpkgsums"
          su - builduser -c "cd '$GITHUB_WORKSPACE/rust/packaging' && makepkg --printsrcinfo" \
            > "$GITHUB_WORKSPACE/rust/packaging/.SRCINFO"

          GIT_SSH_COMMAND="ssh -i $HOME/.ssh/aur -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts" \
            git clone ssh://aur@aur.archlinux.org/bigtube.git aur-package
          cp "$GITHUB_WORKSPACE/rust/packaging/PKGBUILD" \
             "$GITHUB_WORKSPACE/rust/packaging/.SRCINFO" aur-package/
          cd aur-package

          git config --global --add safe.directory "$PWD"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet PKGBUILD .SRCINFO; then
            echo "AUR package already up to date."
            exit 0
          fi

          git add PKGBUILD .SRCINFO
          git commit -m "Lancamento da versao ${TAG} (Rust)"
          GIT_SSH_COMMAND="ssh -i $HOME/.ssh/aur -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts" git push
