name: Build and Release

# Publica release no GitHub + pacote Arch + AUR.
# Dispara automaticamente ao push de tag vX.Y.Z (ex.: git tag v2.0.7 && git push origin v2.0.7).
# Também pode ser executado manualmente em Actions → Build and Release → Run workflow.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Versão sem o v (ex.: 2.0.7)"
        required: true
        default: "2.0.9"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # =========================================================
  # JOB 1: Compilação Padrão (Traduções + Wheel + Tar.gz)
  # =========================================================
  build-and-release:
    name: Build and Publish Standard Release
    runs-on: ubuntu-latest
    outputs:
      pkgver: ${{ steps.set_version.outputs.pkgver }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y gettext

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest

      - name: Set App Version
        id: set_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PKGVER="${{ github.event.inputs.version }}"
          else
            PKGVER="${GITHUB_REF#refs/tags/v}"
          fi
          echo "Atualizando pyproject.toml para a versão $PKGVER"
          poetry version "$PKGVER"
          echo "pkgver=$PKGVER" >> "$GITHUB_OUTPUT"

      - name: Compile Translations
        run: |
          LOCALES_DIR="src/bigtube/data/locales"
          for po_file in po/*.po; do
            LANG=$(basename "$po_file" .po)
            mkdir -p "$LOCALES_DIR/$LANG/LC_MESSAGES"
            msgfmt "$po_file" -o "$LOCALES_DIR/$LANG/LC_MESSAGES/bigtube.mo"
          done

      - name: Build Project Packages
        run: poetry build

      - name: Publish Standard Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz

  # =========================================================
  # JOB 2: Compilação Arch Linux (PKGBUILD)
  # =========================================================
  build-arch-package:
    name: Build Arch Linux Package
    needs: build-and-release
    runs-on: ubuntu-latest

    # Executa todo o processo dentro de um sistema Arch Linux puro
    container:
      image: archlinux:base-devel

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Arch Environment & Build
        env:
          PKGVER: ${{ needs.build-and-release.outputs.pkgver }}
        run: |
          # 0.1 Injetar a versão correta no PKGBUILD ANTES de compilar
          sed -i "s/^pkgver=.*/pkgver=${PKGVER}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

          # 1. Atualizar o sistema e garantir que o sudo/git estão instalados
          pacman -Syu --noconfirm git sudo

          # 2. Criar um utilizador "dummy" sem privilégios (exigência de segurança do makepkg)
          useradd -m builduser
          echo "builduser ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builduser

          # 3. Dar permissões ao novo utilizador sobre a pasta de trabalho
          chown -R builduser:builduser .

          # 4. Executar o makepkg na pasta correta do GitHub
          su - builduser -c "cd $PWD && makepkg -s --noconfirm"

      - name: Publish Arch Package to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Anexa o ficheiro final (.pkg.tar.zst) na release criada pelo Job 1
          files: "*.pkg.tar.zst"

  # =========================================================
  # JOB 3: Publicação Automática no AUR
  # =========================================================
  deploy-aur:
    name: Deploy to Arch User Repository
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Update PKGBUILD Version dynamically
        env:
          PKGVER: ${{ needs.build-and-release.outputs.pkgver }}
        run: |
          echo "Injetando a versão $PKGVER no PKGBUILD..."

          # 2. Injeta diretamente no ficheiro
          sed -i "s/^pkgver=.*/pkgver=${PKGVER}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

          # 3. Confirmação visual nos logs
          grep "^pkgver=" PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: bigtube
          pkgbuild: ./PKGBUILD
          commit_username: ${{ github.actor }}
          commit_email: ${{ github.actor }}@users.noreply.github.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Lançamento da versão v${{ needs.build-and-release.outputs.pkgver }}"
          force_push: true
