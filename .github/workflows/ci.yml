name: CI

# Lint, testes e build de verificação em cada push/PR na main.
# O release completo (GitHub Release + Arch + AUR) continua em release.yml (tags v*.*.*).
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  lint-and-test:
    name: Lint & Test
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install system dependencies (PyGObject/pycairo)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            python3-dev \
            libcairo2-dev \
            libglib2.0-dev \
            libgirepository1.0-dev \
            libgirepository-2.0-dev \
            libffi-dev \
            gir1.2-gtk-4.0 \
            gobject-introspection

      - name: Install Poetry
        run: python -m pip install poetry

      - name: Install dependencies
        run: poetry install --only dev --no-root

      - name: Ruff (lint)
        run: poetry run ruff check .

      - name: Ruff (format check)
        run: poetry run ruff format --check .

      - name: Pytest
        run: poetry run pytest

  build-package:
    name: Build package (smoke)
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    needs: lint-and-test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext

      - name: Install Poetry
        run: python -m pip install poetry

      - name: Check Poetry configuration
        run: poetry check --lock

      - name: Compile translations
        run: |
          LOCALES_DIR="src/bigtube/data/locales"
          for po_file in po/*.po; do
            LANG=$(basename "$po_file" .po)
            mkdir -p "$LOCALES_DIR/$LANG/LC_MESSAGES"
            msgfmt --check "$po_file" -o "$LOCALES_DIR/$LANG/LC_MESSAGES/bigtube.mo"
          done

      - name: Build wheel and sdist
        run: poetry build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: python-bigtube-dist
          path: dist/*
          if-no-files-found: error
