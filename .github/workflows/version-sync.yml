name: Sync version

# Recalcula 2.0.7 + N commits -> 2.0.(7+N) e commita na main (evita drift).
on:
  push:
    branches: [main, master]

jobs:
  bump-version:
    name: Sync version from git
    if: >
      github.event_name == 'push' &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, 'chore: sync version')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compute and write version
        id: ver
        run: |
          VERSION=$(python scripts/sync_version_from_git.py)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit version bump if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet pyproject.toml PKGBUILD po/ .github/workflows/release.yml \
              src/bigtube/core/network_checker.py src/bigtube/core/image_loader.py; then
            echo "Version already in sync (${{ steps.ver.outputs.version }})"
            exit 0
          fi
          git add pyproject.toml PKGBUILD po/ .github/workflows/release.yml \
              src/bigtube/core/network_checker.py src/bigtube/core/image_loader.py
          git commit -m "chore: sync version to ${{ steps.ver.outputs.version }} [skip ci]"
          git push
